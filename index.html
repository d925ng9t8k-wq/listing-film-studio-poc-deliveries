<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>5 Twin Hills Ridge Dr | Listing Film Studio</title>
    <style>
      :root { color-scheme: dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #080b0f; color: #f7f8fa; }
      header { padding: 22px 18px 16px; border-bottom: 1px solid #252a32; }
      h1 { margin: 0; font-size: 21px; line-height: 1.25; letter-spacing: 0; }
      p { margin: 6px 0 0; color: #aeb6c2; font-size: 14px; }
      nav { display: flex; gap: 8px; padding: 14px 18px; position: sticky; top: 0; z-index: 2; background: rgba(8, 11, 15, 0.96); }
      nav a { flex: 1; padding: 12px; border: 1px solid #39404b; border-radius: 6px; color: #fff; text-align: center; text-decoration: none; font-weight: 650; }
      main { padding: 0 0 36px; }
      section { scroll-margin-top: 72px; padding: 14px 0 26px; }
      h2 { margin: 0 18px 12px; font-size: 16px; letter-spacing: 0; }
      video { display: block; width: 100%; max-height: 76vh; background: #000; }
      .portrait { width: min(100%, 520px); margin: 0 auto; }
      .play { display: flex; align-items: center; justify-content: center; gap: 9px; width: calc(100% - 36px); margin: 12px 18px 0; padding: 13px 16px; border: 0; border-radius: 6px; background: #f7f8fa; color: #080b0f; font: inherit; font-weight: 750; cursor: pointer; }
      .play span { font-size: 18px; line-height: 1; }
      .download { display: block; margin: 12px 18px 0; color: #9eb8ff; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>5 Twin Hills Ridge Dr</h1>
      <p>Listing Film Studio delivery proof</p>
    </header>
    <nav aria-label="Video formats">
      <a href="#landscape">Landscape</a>
      <a href="#portrait">Portrait</a>
    </nav>
    <main>
      <section id="landscape">
        <h2>16:9 Landscape</h2>
        <video controls playsinline preload="metadata" poster="poster-landscape.jpg">
          <source src="twin-hills-landscape.mp4" type="video/mp4" />
        </video>
        <button class="play" type="button" data-player="#landscape video"><span aria-hidden="true">&#9654;</span> Play landscape</button>
        <a class="download" href="twin-hills-landscape.mp4" download>Download landscape MP4</a>
      </section>
      <section id="portrait">
        <h2>9:16 Portrait</h2>
        <div class="portrait">
          <video controls playsinline preload="metadata" poster="poster-portrait.jpg">
            <source src="https://github.com/d925ng9t8k-wq/listing-film-studio-poc-deliveries/releases/download/twin-hills-poc/twin-hills-portrait.mp4" type="video/mp4" />
          </video>
        </div>
        <button class="play" type="button" data-player="#portrait video"><span aria-hidden="true">&#9654;</span> Play portrait</button>
        <a class="download" href="https://github.com/d925ng9t8k-wq/listing-film-studio-poc-deliveries/releases/download/twin-hills-poc/twin-hills-portrait.mp4">Download portrait MP4</a>
      </section>
    </main>
    <script>
      document.querySelectorAll("[data-player]").forEach((button) => {
        button.addEventListener("click", async () => {
          const video = document.querySelector(button.dataset.player);
          if (!video) return;
          try {
            await video.play();
            button.hidden = true;
          } catch {
            video.controls = true;
          }
        });
      });
    </script>
  </body>
</html>
